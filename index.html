<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>大姐小妹首爾療情傷 ❤️‍🩹</title>
<style>
@font-face {
  font-family: 'MicrosoftJhengHei';
  src: local('Microsoft JhengHei');
}

:root {
  /* 莫蘭迪色系 Morandi Palette */
  --morandi-blue: #8FA3B0;
  --morandi-blue-light: #B8C9D1;
  --morandi-blue-pale: #E3EAEE;
  --morandi-brown: #A08A78;
  --morandi-brown-light: #C4B3A4;
  --morandi-brown-pale: #EDE4DA;
  --cream-yellow: #F2E8D5;
  --cream-yellow-light: #F8F1E3;
  --cream-yellow-deep: #E8D9B8;

  /* 深色文字 */
  --deep-blue: #2F4858;
  --deep-brown: #5C4632;
  --deep-red: #8B3A3A;
  --deep-red-soft: #A8504F;

  --ink: #3A3A3A;
  --paper: #FDFBF7;
  --line: rgba(143, 163, 176, 0.25);

  --shadow-soft: 0 4px 16px rgba(92, 70, 50, 0.08);
  --shadow-card: 0 2px 10px rgba(143, 163, 176, 0.18);
  --radius: 18px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", -apple-system, sans-serif;
  background: var(--cream-yellow-light);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

#app {
  max-width: 560px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--paper);
  position: relative;
  box-shadow: 0 0 40px rgba(92,70,50,0.06);
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
.app-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: linear-gradient(135deg, var(--morandi-blue-pale) 0%, var(--cream-yellow) 55%, var(--morandi-brown-pale) 100%);
  padding: 22px 20px 16px;
  border-bottom: 1px solid var(--line);
}

.app-title {
  font-size: 21px;
  font-weight: 700;
  color: var(--deep-blue);
  letter-spacing: 0.5px;
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.app-title .accent {
  color: var(--deep-red);
}

.app-subtitle {
  font-size: 12px;
  color: var(--deep-brown);
  margin-top: 4px;
  opacity: 0.85;
  letter-spacing: 1px;
}

/* ===== TAB NAV ===== */
.tab-nav {
  position: sticky;
  top: 0;
  z-index: 49;
  display: flex;
  background: var(--paper);
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }

.tab-btn {
  flex: 1;
  min-width: 64px;
  padding: 13px 6px 11px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--morandi-brown);
  background: none;
  border: none;
  cursor: pointer;
  position: relative;
  white-space: nowrap;
  font-family: inherit;
  transition: color 0.2s;
}

.tab-btn.active {
  color: var(--deep-blue);
}

.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 18%;
  right: 18%;
  height: 3px;
  border-radius: 3px 3px 0 0;
  background: var(--morandi-blue);
}

/* ===== MAIN CONTENT ===== */
.tab-content {
  flex: 1;
  padding: 18px 16px 60px;
  animation: fadeIn 0.35s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ===== DAY SELECTOR (Itinerary) ===== */
.day-pills {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 18px;
  scrollbar-width: none;
}
.day-pills::-webkit-scrollbar { display: none; }

.day-pill {
  flex-shrink: 0;
  padding: 9px 16px;
  border-radius: 30px;
  border: 1.5px solid var(--morandi-blue-light);
  background: var(--paper);
  color: var(--deep-blue);
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.day-pill .pill-date {
  display: block;
  font-size: 10.5px;
  font-weight: 400;
  opacity: 0.7;
  margin-top: 1px;
}

.day-pill.active {
  background: var(--morandi-blue);
  border-color: var(--morandi-blue);
  color: #fff;
}

/* ===== DAY HEADER / ROUTE ===== */
.day-route-card {
  background: linear-gradient(120deg, var(--morandi-blue-pale), var(--cream-yellow-light));
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 18px;
  border: 1px solid var(--line);
}

.day-route-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--deep-blue);
  margin-bottom: 6px;
}

.day-route-flow {
  font-size: 13px;
  color: var(--deep-brown);
  line-height: 1.7;
  font-weight: 600;
}

.day-route-flow .arrow { color: var(--morandi-brown); margin: 0 2px; }

/* ===== TIMELINE ===== */
.timeline {
  position: relative;
  padding-left: 22px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 6px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: linear-gradient(to bottom, var(--morandi-blue-light), var(--morandi-brown-light));
  border-radius: 2px;
}

.timeline-item {
  position: relative;
  margin-bottom: 16px;
}

.timeline-dot {
  position: absolute;
  left: -22px;
  top: 4px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--paper);
  border: 2.5px solid var(--morandi-blue);
}

.timeline-item.food .timeline-dot { border-color: var(--deep-red-soft); }
.timeline-item.transport .timeline-dot { border-color: var(--morandi-brown); }
.timeline-item.note .timeline-dot { border-color: var(--morandi-brown-light); }
.timeline-item.content .timeline-dot { border-color: #C9A876; }

.timeline-time {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  background: var(--morandi-blue);
  padding: 2px 9px;
  border-radius: 20px;
  margin-bottom: 6px;
}

.timeline-item.food .timeline-time { background: var(--deep-red-soft); }
.timeline-item.transport .timeline-time { background: var(--morandi-brown); }

.card.content-card {
  background: linear-gradient(120deg, var(--cream-yellow-deep), var(--cream-yellow-light));
  border-color: #C9A876;
}
.card-title.content-title { color: #8A6D2F; }

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 13px 15px;
  box-shadow: var(--shadow-card);
}

.card-title {
  font-size: 14.5px;
  font-weight: 700;
  color: var(--deep-blue);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-title.food-title { color: var(--deep-red); }

.card-desc {
  font-size: 12.5px;
  color: var(--ink);
  opacity: 0.8;
  line-height: 1.6;
  margin-bottom: 6px;
}

.card-tag {
  display: inline-block;
  font-size: 10.5px;
  background: var(--morandi-brown-pale);
  color: var(--deep-brown);
  padding: 2px 8px;
  border-radius: 10px;
  margin-right: 5px;
  font-weight: 600;
}

.card-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 700;
  color: var(--deep-blue);
  text-decoration: none;
  margin-top: 6px;
  padding: 6px 12px;
  background: var(--morandi-blue-pale);
  border-radius: 20px;
  transition: all 0.15s;
}
.card-link:active { transform: scale(0.96); }

.card-link.naver {
  background: #E7F3E3;
  color: #2B6B3A;
}

.note-text {
  font-size: 12.5px;
  color: var(--deep-brown);
  font-style: normal;
  line-height: 1.6;
  opacity: 0.9;
}

/* ===== SECTION TITLES ===== */
.section-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--deep-blue);
  margin: 22px 0 12px;
  padding-left: 10px;
  border-left: 4px solid var(--morandi-blue);
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-title:first-child { margin-top: 0; }
.section-title.brown { border-left-color: var(--morandi-brown); color: var(--deep-brown); }
.section-title.red { border-left-color: var(--deep-red-soft); color: var(--deep-red); }

/* ===== COMMON UI ===== */
.tool-card {
  background: var(--cream-yellow-light);
  border: 1px solid var(--cream-yellow-deep);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
}

.tool-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--deep-brown);
  margin-bottom: 6px;
}

.tool-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--morandi-brown-light);
  border-radius: 12px;
  font-size: 16px;
  font-family: inherit;
  color: var(--deep-blue);
  background: var(--paper);
  font-weight: 700;
}
.tool-input:focus { outline: 2px solid var(--morandi-blue); border-color: var(--morandi-blue); }

.swap-result {
  margin-top: 10px;
  font-size: 22px;
  font-weight: 700;
  color: var(--deep-red);
}
.swap-result .unit { font-size: 13px; color: var(--deep-brown); font-weight: 500; margin-left: 4px;}

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
}
.info-row:last-child { border-bottom: none; }

.info-row-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--deep-brown);
}
.info-row-value {
  font-size: 12.5px;
  color: var(--ink);
  text-align: right;
}

.btn-primary {
  display: inline-block;
  background: var(--morandi-blue);
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  padding: 9px 18px;
  border-radius: 20px;
  text-decoration: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
}

.checklist-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 11px 0;
  border-bottom: 1px solid var(--line);
}
.checklist-item:last-child { border-bottom: none; }

.checklist-checkbox {
  width: 21px;
  height: 21px;
  border-radius: 7px;
  border: 2px solid var(--morandi-blue-light);
  flex-shrink: 0;
  margin-top: 1px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--paper);
  transition: all 0.15s;
}
.checklist-checkbox.checked {
  background: var(--morandi-blue);
  border-color: var(--morandi-blue);
}
.checklist-checkbox.checked::after {
  content: '✓';
  color: #fff;
  font-size: 13px;
  font-weight: 700;
}

.checklist-text {
  font-size: 13.5px;
  color: var(--ink);
  line-height: 1.5;
  flex: 1;
}
.checklist-text.checked-text {
  text-decoration: line-through;
  opacity: 0.45;
}
.checklist-sub {
  font-size: 11.5px;
  color: var(--morandi-brown);
  margin-top: 2px;
}

/* ===== WEATHER ===== */
.weather-strip {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  margin-bottom: 18px;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.weather-strip::-webkit-scrollbar { display: none; }

.weather-card {
  flex-shrink: 0;
  min-width: 84px;
  background: linear-gradient(160deg, var(--morandi-blue-pale), var(--paper));
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px 10px;
  text-align: center;
}
.weather-card.today {
  background: linear-gradient(160deg, var(--morandi-blue), var(--deep-blue));
  border-color: var(--morandi-blue);
}
.weather-card.today .weather-date,
.weather-card.today .weather-temp,
.weather-card.today .weather-desc { color: #fff; }

.weather-date {
  font-size: 11px;
  font-weight: 700;
  color: var(--deep-brown);
  margin-bottom: 4px;
}
.weather-icon { font-size: 24px; margin-bottom: 4px; }
.weather-temp {
  font-size: 13px;
  font-weight: 700;
  color: var(--deep-blue);
}
.weather-temp .lo { opacity: 0.6; font-weight: 500; }
.weather-desc {
  font-size: 10px;
  color: var(--morandi-brown);
  margin-top: 2px;
}
.weather-rain {
  font-size: 10px;
  color: var(--deep-blue);
  margin-top: 3px;
}
.weather-card.today .weather-rain { color: var(--cream-yellow); }

/* ===== ACCOUNT MANAGEMENT (帳號經營) ===== */
.content-task-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px 15px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
}
.content-task-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.content-task-icon { font-size: 18px; }
.content-task-title {
  font-size: 14.5px;
  font-weight: 700;
  color: var(--deep-blue);
}
.content-task-count {
  margin-left: auto;
  font-size: 11px;
  font-weight: 700;
  color: var(--morandi-brown);
  background: var(--morandi-brown-pale);
  padding: 2px 9px;
  border-radius: 10px;
}

/* ===== NIGHTLIFE ===== */
.venue-card {
  background: linear-gradient(135deg, var(--deep-blue) 0%, #3D5A6C 100%);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 14px;
  color: #F2E8D5;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-soft);
}

.venue-area-tag {
  display: inline-block;
  font-size: 10.5px;
  font-weight: 700;
  background: rgba(242,232,213,0.18);
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}

.venue-name {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 6px;
  color: #fff;
}

.venue-desc {
  font-size: 12.5px;
  line-height: 1.7;
  opacity: 0.88;
  margin-bottom: 10px;
}

.venue-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 700;
  color: var(--deep-blue);
  background: #F2E8D5;
  text-decoration: none;
  padding: 7px 14px;
  border-radius: 20px;
}

/* ===== DASHBOARD ===== */
.dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 18px;
}

.dash-stat {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px;
  box-shadow: var(--shadow-card);
}

.dash-stat-label {
  font-size: 11px;
  color: var(--morandi-brown);
  font-weight: 600;
  margin-bottom: 4px;
}

.dash-stat-value {
  font-size: 19px;
  font-weight: 700;
  color: var(--deep-blue);
}
.dash-stat-value.red { color: var(--deep-red); }

.dash-stat-sub {
  font-size: 10.5px;
  color: var(--morandi-brown);
  margin-top: 2px;
}

.progress-bar-track {
  width: 100%;
  height: 10px;
  background: var(--morandi-blue-pale);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 6px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--morandi-blue), var(--morandi-brown));
  border-radius: 10px;
  transition: width 0.4s ease;
}

/* ===== RECEIPT / EXPENSE ===== */
.upload-zone {
  border: 2px dashed var(--morandi-blue-light);
  border-radius: var(--radius);
  padding: 30px 16px;
  text-align: center;
  background: var(--morandi-blue-pale);
  cursor: pointer;
  margin-bottom: 16px;
}
.upload-zone-icon { font-size: 32px; margin-bottom: 8px; }
.upload-zone-text { font-size: 13px; font-weight: 700; color: var(--deep-blue); }
.upload-zone-sub { font-size: 11px; color: var(--morandi-brown); margin-top: 4px; }

.expense-item {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 13px 15px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-card);
}

.expense-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.expense-store {
  font-size: 14px;
  font-weight: 700;
  color: var(--deep-blue);
}

.expense-amount {
  font-size: 15px;
  font-weight: 700;
  color: var(--deep-red);
  white-space: nowrap;
}

.expense-meta {
  font-size: 11px;
  color: var(--morandi-brown);
  margin-top: 4px;
}

.expense-cat-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 6px;
  background: var(--cream-yellow-deep);
  color: var(--deep-brown);
}

.func-card {
  background: linear-gradient(135deg, var(--cream-yellow-light), var(--morandi-blue-pale));
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  border: 1px solid var(--line);
}

.func-card-title {
  font-size: 14.5px;
  font-weight: 700;
  color: var(--deep-blue);
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.func-card-desc {
  font-size: 12px;
  color: var(--deep-brown);
  line-height: 1.6;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--morandi-brown);
}
.empty-state-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.6; }
.empty-state-text { font-size: 13px; }

/* loading spinner */
.spinner {
  width: 18px; height: 18px;
  border: 2.5px solid var(--morandi-blue-pale);
  border-top-color: var(--morandi-blue);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 0; height: 0; }

button { font-family: inherit; }

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <div class="app-title">大姐小妹首爾療情傷 <span class="accent">❤️‍🩹</span></div>
    <div class="app-subtitle">SEOUL HEALING TRIP · 2026.06.19 — 06.23</div>
  </div>

  <div class="tab-nav" id="tabNav"></div>

  <div class="tab-content" id="tabContent"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
